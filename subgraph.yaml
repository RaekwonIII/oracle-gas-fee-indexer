specVersion: 1.1.0
description: Indexes SSVNetwork WeightedRootProposed events (successful oracle root submissions) and the gas fees paid for them
repository: https://github.com/RaekwonIII/oracle-gas-fee-indexer
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: SSVNetwork
    network: mainnet
    source:
      address: "0xDD9BC35aE942eF0cFa76930954a156B3fF30a4E1"
      abi: SSVNetwork
      startBlock: 17507487
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GasFeePayment
        - SenderGasFeeStats
        - MonthlyGasFeeBySender
      abis:
        - name: SSVNetwork
          file: ./abis/SSVNetwork.json
      eventHandlers:
        - event: WeightedRootProposed(indexed bytes32,indexed uint64,uint256,uint256,uint32,address)
          handler: handleWeightedRootProposed
          # Required so we can read the transaction receipt (gasUsed) in the handler.
          receipt: true
      file: ./src/mapping.ts
